server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|gif|ico|svg|woff2)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}
